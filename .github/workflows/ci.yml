name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: root-node-modules-${{ hashFiles('app/package-lock.json') }}
          restore-keys: root-node-modules-

      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: app/server/node_modules
          key: server-node-modules-${{ hashFiles('app/server/package-lock.json') }}
          restore-keys: server-node-modules-

      - name: Install root dependencies
        working-directory: app
        run: npm ci

      - name: Install server dependencies
        working-directory: app/server
        run: npm ci

      - name: Build frontend
        working-directory: app
        run: npm run build

  backend-test:
    name: Backend Tests
    needs: lint-and-build
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: root-node-modules-${{ hashFiles('app/package-lock.json') }}
          restore-keys: root-node-modules-

      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: app/server/node_modules
          key: server-node-modules-${{ hashFiles('app/server/package-lock.json') }}
          restore-keys: server-node-modules-

      - name: Install root dependencies
        working-directory: app
        run: npm ci

      - name: Install server dependencies
        working-directory: app/server
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 30); do
            if mongosh --eval "db.runCommand({ ping: 1 })" mongodb://localhost:27017/fitpro_test --quiet 2>/dev/null; then
              echo "MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done

      - name: Run backend tests with coverage
        working-directory: app/server
        run: npm run test -- --coverage

  frontend-test:
    name: Frontend Tests
    needs: lint-and-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: root-node-modules-${{ hashFiles('app/package-lock.json') }}
          restore-keys: root-node-modules-

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: app
        run: npm run test -- --coverage

  ci-check:
    name: CI Gate
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend: ${{ needs.backend-test.result }}"
          echo "Frontend: ${{ needs.frontend-test.result }}"
          if [ "${{ needs.backend-test.result }}" != "success" ] || [ "${{ needs.frontend-test.result }}" != "success" ]; then
            echo "::error::CI pipeline failed. All tests must pass before merging."
            exit 1
          fi
          echo "All CI checks passed!"
